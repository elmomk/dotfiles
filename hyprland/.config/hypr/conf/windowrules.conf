# See https://wiki.hyprland.org/Configuring/Window-Rules/
# Use `hyprctl clients` to find class or title

# Claude Code terminal (spawned by quickshell claude panel)
windowrule {
    name = claude-code
    match:class = ^(claude-code)$

    float = on
    size = 760 1960
    move = 36 136
    pin = on
    border_size = 0
    no_shadow = on
}
