# See https://wiki.hyprland.org/Configuring/Window-Rules/
# Use `hyprctl clients` to find class or title

# Claude Code terminal (scratchpad)
windowrule {
    name = claude-code
    match:class = ^(claude-code)$

    float = on
    size = 1500 1900
    move = 0 130
    border_size = 2
    animation = slideIn left
    opacity = 0.7 override 0.7 override
}

# Google Gemini (scratchpad)
windowrule {
    name = gemini
    match:class = ^(brave-gemini\.google\.com__-Default)$

    opacity = 0.7 override 0.7 override
}

# Alacritty on scratchpads
windowrule {
    name = alacritty-special
    match:class = ^(Alacritty)$
    match:workspace = s[true]

    opacity = 0.7 override 0.7 override
}
