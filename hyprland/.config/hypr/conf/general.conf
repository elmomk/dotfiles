env = XCURSOR_SIZE,24

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7e9cd8ee) rgba(957fb8ee) 45deg
    col.inactive_border = rgba(2a2a3766)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a2600)
    }
    active_opacity = 1.0
    inactive_opacity = 0.92
}

animations {
    enabled = yes, please :)

    # Material 3 curves (aligned with QuickShell)
    bezier = m3standard, 0.2, 0, 0, 1
    bezier = m3decel, 0.05, 0.7, 0.1, 1
    bezier = m3accel, 0.3, 0, 0.8, 0.15
    bezier = m3expressive, 0.38, 1.21, 0.22, 1
    bezier = linear, 0, 0, 1, 1

    animation = global, 1, 4, m3standard
    animation = border, 1, 4, m3standard
    animation = windows, 1, 4, m3expressive
    animation = windowsIn, 1, 4, m3decel, popin 80%
    animation = windowsOut, 1, 3, m3accel, popin 80%
    animation = fadeIn, 1, 3, m3decel
    animation = fadeOut, 1, 2, m3accel
    animation = fade, 1, 3, m3standard
    animation = layers, 1, 3.5, m3expressive
    animation = layersIn, 1, 3, m3decel, fade
    animation = layersOut, 1, 2, m3accel, fade
    animation = fadeLayersIn, 1, 2, m3decel
    animation = fadeLayersOut, 1, 2, m3accel
    animation = workspaces, 1, 4, m3expressive, slide
    animation = specialWorkspaceIn, 1, 3, m3decel, slidefade -100%
    animation = specialWorkspaceOut, 1, 3, m3accel, slidefade -100%
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    force_split = 2 # Always split on the right
}

