$brave = brave-beta

# Core services
exec-once = /usr/lib/gnome-keyring/daemon-launch
exec-once = systemctl --user start hyprpolkitagent
exec-once = qs & firewall-applet & fcitx5 &
exec-once = elephant &

# Clipboard history (QS launcher reads via cliphist)
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &

# Apps
exec-once=[workspace 1] alacritty -e ~/bin/tmux-fzf
exec-once=[workspace 6 silent] firefox
exec-once=[workspace 10 silent] thunderbird

# Special workspaces
exec-once=[workspace special:gemini silent] $brave --app=https://gemini.google.com --enable-features=UseOzonePlatform --ozone-platform=wayland
exec-once=[workspace special:line silent] $brave --app=chrome-extension://ophjlpahpchlmihnnnihgmmeilfjmjjc/index.html --enable-features=UseOzonePlatform --ozone-platform=wayland
