# -- Options --
setw -g mouse on
setw -g mode-keys vi
set -s default-terminal 'tmux-256color'
set-option -sa terminal-overrides ',alacritty:RGB'
set -g status-position top

# -- Auto-install TPM --
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# -- Plugins --
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-continuum'

# -- Session persistence --
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @yank_with_mouse on

# -- Keybindings --
bind-key -r i display-popup -E "~/bin/cht.sh"
bind-key -r F display-popup -E "~/bin/tmux-sessionizer"
bind-key -r C display-popup -E "~/bin/tmux-win.sh"
bind-key -r S display-popup -E "~/bin/tmux-fzf"
bind-key -r W display-popup -E "~/bin/tmux-fzf-win"
bind-key -r k display-popup -E "~/bin/tmux-fzf-kill"
bind-key -r r run-shell "~/bin/tmux-sync"

# -- Panes/windows inherit current path --
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# -- Claude Code Attention Plugin --
# Theme options: kanagawa-dragon, catppuccin-mocha, tokyonight, dracula
set -g @claude-theme 'catppuccin-mocha'
set -g @claude-popup-key 'G'
set -g @claude-done-popup 'on'
set -g @plugin 'elmomk/tmux_cc_attention'

# -- Initialize TPM (keep at bottom) --
run '~/.tmux/plugins/tpm/tpm'
